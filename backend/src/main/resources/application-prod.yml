server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:postgres}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: ${DB_MIN_IDLE:1}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  bootstrap:
    admin:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}
      first-name: ${ADMIN_FIRST_NAME:Platform}
      last-name: ${ADMIN_LAST_NAME:Admin}
      phone: ${ADMIN_PHONE}

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: WARN